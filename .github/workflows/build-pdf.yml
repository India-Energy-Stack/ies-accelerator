name: Build & publish PDF

# Build the implementation-guide PDF on every merge to main and publish it to
# GitHub Pages (gh-pages branch). Single overwritten PDF at a stable URL:
#   https://india-energy-stack.github.io/ies-accelerator/ies_accelerator.pdf

on:
  push:
    branches: [main]
    # Only rebuild when content or the build tooling changes.
    paths:
      - "**/*.md"
      - "scripts/build_pdf.py"
      - "scripts/build_pdf.sh"
      - ".github/workflows/build-pdf.yml"
  workflow_dispatch: {}

# Avoid overlapping publishes if two merges land close together.
concurrency:
  group: build-pdf
  cancel-in-progress: true

# No write permission needed for GITHUB_TOKEN: the org disables write for it,
# so we publish using an SSH deploy key (secrets.ACTIONS_DEPLOY_KEY) instead.

env:
  TECTONIC_VERSION: "0.15.0"

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pandoc and fonts
        # fonts-dejavu provides "DejaVu Sans Mono" for the PDF's monofont
        # (the script defaults to macOS-only "Menlo", overridden below).
        run: sudo apt-get update && sudo apt-get install -y pandoc fonts-dejavu

      - name: Cache tectonic binary
        id: cache-tectonic
        uses: actions/cache@v4
        with:
          path: ~/.local/bin/tectonic
          key: tectonic-${{ env.TECTONIC_VERSION }}-linux-x86_64

      - name: Install tectonic
        if: steps.cache-tectonic.outputs.cache-hit != 'true'
        run: |
          mkdir -p "$HOME/.local/bin"
          url="https://github.com/tectonic-typesetting/tectonic/releases/download/tectonic%40${TECTONIC_VERSION}/tectonic-${TECTONIC_VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          curl -fsSL "$url" | tar -xz -C "$HOME/.local/bin" tectonic
          chmod +x "$HOME/.local/bin/tectonic"

      - name: Add tectonic to PATH
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install mermaid-cli
        run: npm install -g @mermaid-js/mermaid-cli

      - name: Build PDF
        env:
          # Use the runner's preinstalled Chrome so puppeteer doesn't download
          # Chromium. build_pdf.sh writes a puppeteer.json from this var.
          PUPPETEER_EXECUTABLE_PATH: /usr/bin/google-chrome
          # Menlo (the script default) is macOS-only; use a font present on the runner.
          MONOFONT: "DejaVu Sans Mono"
        run: bash scripts/build_pdf.sh

      - name: Stage site
        run: |
          mkdir -p public
          cp build/ies_accelerator.pdf public/ies_accelerator.pdf
          cat > public/index.html <<'HTML'
          <!doctype html>
          <meta charset="utf-8">
          <title>IES Accelerator Implementation Guide</title>
          <meta http-equiv="refresh" content="0; url=ies_accelerator.pdf">
          <p><a href="ies_accelerator.pdf">IES Accelerator Implementation Guide (PDF)</a></p>
          HTML

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          deploy_key: ${{ secrets.ACTIONS_DEPLOY_KEY }}
          publish_dir: ./public
          publish_branch: gh-pages
          force_orphan: true
