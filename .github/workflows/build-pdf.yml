name: Build & publish PDF

# Publish the whole site to the gh-pages branch on every merge to main: a
# mirror of the repo tree (so all schema/context URLs keep resolving) plus the
# freshly built implementation-guide PDF. GitHub Pages serves gh-pages at the
# same per-repo URL, so existing paths are unchanged, e.g.:
#   https://india-energy-stack.github.io/ies-accelerator/schemas/.../context.jsonld
#   https://india-energy-stack.github.io/ies-accelerator/ies-report.pdf

on:
  push:
    branches: [main]
    # Republish when served content (docs, schema artifacts) or tooling changes.
    paths:
      - "**/*.md"
      - "**/*.json"
      - "**/*.jsonld"
      - "**/*.yaml"
      - "**/*.yml"
      - "scripts/build_pdf.py"
      - "scripts/build_pdf.sh"
      - ".github/workflows/build-pdf.yml"
  workflow_dispatch: {}

# Avoid overlapping publishes if two merges land close together.
concurrency:
  group: build-pdf
  cancel-in-progress: true

# No write permission needed for GITHUB_TOKEN: the org disables write for it,
# so we publish using an SSH deploy key (secrets.ACTIONS_DEPLOY_KEY) instead.

env:
  TECTONIC_VERSION: "0.15.0"

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pandoc and fonts
        # fonts-dejavu provides "DejaVu Sans Mono" for the PDF's monofont
        # (the script defaults to macOS-only "Menlo", overridden below).
        run: sudo apt-get update && sudo apt-get install -y pandoc fonts-dejavu

      - name: Cache tectonic binary
        id: cache-tectonic
        uses: actions/cache@v4
        with:
          path: ~/.local/bin/tectonic
          key: tectonic-${{ env.TECTONIC_VERSION }}-linux-x86_64

      - name: Install tectonic
        if: steps.cache-tectonic.outputs.cache-hit != 'true'
        run: |
          mkdir -p "$HOME/.local/bin"
          url="https://github.com/tectonic-typesetting/tectonic/releases/download/tectonic%40${TECTONIC_VERSION}/tectonic-${TECTONIC_VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          curl -fsSL "$url" | tar -xz -C "$HOME/.local/bin" tectonic
          chmod +x "$HOME/.local/bin/tectonic"

      - name: Add tectonic to PATH
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install mermaid-cli
        run: npm install -g @mermaid-js/mermaid-cli

      - name: Build PDF
        env:
          # Use the runner's preinstalled Chrome so puppeteer doesn't download
          # Chromium. build_pdf.sh writes a puppeteer.json from this var.
          PUPPETEER_EXECUTABLE_PATH: /usr/bin/google-chrome
          # Menlo (the script default) is macOS-only; use a font present on the runner.
          MONOFONT: "DejaVu Sans Mono"
        run: bash scripts/build_pdf.sh

      - name: Stage site
        run: |
          mkdir -p public
          # Mirror everything main currently serves so all existing URLs (schema
          # JSON/JSON-LD/YAML contexts, docs, etc.) keep resolving from gh-pages.
          rsync -a \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='build/' \
            --exclude='public/' \
            ./ public/
          # Add the freshly built PDF (published as ies-report.pdf) and a root
          # landing page.
          cp build/ies_accelerator.pdf public/ies-report.pdf
          # Serve files literally (no Jekyll); .nojekyll is mirrored from root,
          # but ensure it exists.
          touch public/.nojekyll
          cat > public/index.html <<'HTML'
          <!doctype html>
          <meta charset="utf-8">
          <title>IES Accelerator Implementation Guide</title>
          <meta http-equiv="refresh" content="0; url=ies-report.pdf">
          <p><a href="ies-report.pdf">IES Accelerator Implementation Guide (PDF)</a></p>
          HTML

      - name: Verify publish dir is complete
        # Guard against a complete-but-wrong tree: every tracked schema artifact
        # and the PDF must be present before we replace gh-pages. If anything is
        # missing the job fails here and the publish step is skipped, leaving the
        # live site untouched.
        run: |
          missing=0
          while IFS= read -r f; do
            if [ ! -f "public/$f" ]; then echo "MISSING: $f"; missing=1; fi
          done < <(git ls-files schemas/)
          [ -f public/ies-report.pdf ] || { echo "MISSING: ies-report.pdf"; missing=1; }
          if [ "$missing" -ne 0 ]; then
            echo "::error::publish dir incomplete; aborting before replacing gh-pages"
            exit 1
          fi
          echo "publish dir complete ($(git ls-files schemas/ | wc -l) schema files + PDF)"

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          deploy_key: ${{ secrets.ACTIONS_DEPLOY_KEY }}
          publish_dir: ./public
          publish_branch: gh-pages
          force_orphan: true
