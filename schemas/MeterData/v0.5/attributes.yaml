openapi: 3.1.1
info:
  title: "MeterData"
  version: "0.5.0"
  description: "Structural JSON Schema for the six compact profile shapes (CUSTOMER, INTERVAL, DAILY, BILLING, INSTANTANEOUS, EVENT). Discriminated by `profileType`."
jsonSchemaDialect: "https://json-schema.org/draft/2020-12/schema"
servers:
  - url: "https://india-energy-stack.github.io/ies-accelerator/schemas"
    description: "Canonical schema registry"
paths: {}
components:
  schemas:
    MeterData:
      $id: "https://india-energy-stack.github.io/ies-accelerator/schemas/MeterData/v0.5/schema.json"
      title: "MeterData"
      description: "Structural JSON Schema for the six compact profile shapes (CUSTOMER, INTERVAL, DAILY, BILLING, INSTANTANEOUS, EVENT). Discriminated by `profileType`. Sibling to ae-ies-mdm-3rdparty-v0.schema.json (which validates the credential-wrapped form). Both forms share semantics via the JSON-LD context but live in separate schemas because their structural shapes differ (compact omits the W3C VC envelope)."
      oneOf:
        - $ref: "#/components/schemas/EnergyData"
        - type: "array"
          minItems: 1
          items:
            $ref: "#/components/schemas/EnergyData"

    EnergyData:
      type: "object"
      title: "EnergyData"
      description: "A single compact data-only profile record. Must be one of the six standard types."
      oneOf:
        - $ref: "#/components/schemas/CustomerProfile"
        - $ref: "#/components/schemas/IntervalProfile"
        - $ref: "#/components/schemas/DailyProfile"
        - $ref: "#/components/schemas/BillingProfile"
        - $ref: "#/components/schemas/InstantaneousProfile"
        - $ref: "#/components/schemas/EventProfile"

    CustomerProfile:
      type: "object"
      title: "CustomerProfile"
      description: "Slow-changing customer + service-point + meter-list summary."
      required:
        - "profileType"
        - "customerRefs"
        - "customer"
        - "serviceDeliveryPoints"
        - "meters"
        - "associations"
      properties:
        profileType:
          type: "string"
          const: "CUSTOMER"
        customerRefs:
          $ref: "#/components/schemas/IdentifierList"
        timeZone:
          type: "string"
          description: "IANA time-zone, e.g. Asia/Kolkata."
        customer:
          $ref: "#/components/schemas/Customer"
        serviceDeliveryPoints:
          type: "array"
          items:
            $ref: "#/components/schemas/ServiceDeliveryPoint"
        meters:
          type: "array"
          items:
            $ref: "#/components/schemas/Meter"
        associations:
          type: "array"
          items:
            $ref: "#/components/schemas/Association"

    IntervalProfile:
      type: "object"
      title: "IntervalProfile"
      description: "Block Load Survey — PT15M / PT30M cadence intervalBlocks for one meter."
      required:
        - "profileType"
        - "customerRefs"
        - "meterRefs"
        - "intervalBlocks"
      properties:
        profileType:
          type: "string"
          const: "INTERVAL"
        customerRefs:
          $ref: "#/components/schemas/IdentifierList"
        meterRefs:
          $ref: "#/components/schemas/IdentifierList"
        serviceDeliveryPointRefs:
          $ref: "#/components/schemas/IdentifierList"
        coveragePeriod:
          $ref: "#/components/schemas/TimeInterval"
        intervalBlocks:
          type: "array"
          minItems: 1
          items:
            $ref: "#/components/schemas/IntervalBlock"

    DailyProfile:
      type: "object"
      title: "DailyProfile"
      description: "Daily Load Profile — P1D intervalBlocks. Same per-meter shape as IntervalProfile."
      required:
        - "profileType"
        - "customerRefs"
        - "meterRefs"
        - "intervalBlocks"
      properties:
        profileType:
          type: "string"
          const: "DAILY"
        customerRefs:
          $ref: "#/components/schemas/IdentifierList"
        meterRefs:
          $ref: "#/components/schemas/IdentifierList"
        serviceDeliveryPointRefs:
          $ref: "#/components/schemas/IdentifierList"
        coveragePeriod:
          $ref: "#/components/schemas/TimeInterval"
        intervalBlocks:
          type: "array"
          minItems: 1
          items:
            $ref: "#/components/schemas/IntervalBlock"

    BillingProfile:
      type: "object"
      title: "BillingProfile"
      description: "Monthly billing summary — energy + max-demand entries in totals[], ToU buckets, bill amount."
      required:
        - "profileType"
        - "customerRefs"
        - "meterRefs"
        - "billingPeriod"
        - "totals"
      properties:
        profileType:
          type: "string"
          const: "BILLING"
        customerRefs:
          $ref: "#/components/schemas/IdentifierList"
        meterRefs:
          $ref: "#/components/schemas/IdentifierList"
        billingPeriod:
          $ref: "#/components/schemas/TimeInterval"
        billNumber:
          type: "string"
        billDate:
          type: "string"
          format: "date"
        dueDate:
          type: "string"
          format: "date"
        currency:
          type: "string"
          description: "ISO 4217 (INR, USD, ...)."
        amountDue:
          type: "number"
        totals:
          type: "array"
          minItems: 1
          items:
            $ref: "#/components/schemas/TotalsEntry"
        touBuckets:
          type: "array"
          items:
            $ref: "#/components/schemas/TouBucket"

    InstantaneousProfile:
      type: "object"
      title: "InstantaneousProfile"
      description: "Snapshot of a meter's electrical quantities at one captured moment."
      required:
        - "profileType"
        - "customerRefs"
        - "meterRefs"
        - "capturedAt"
        - "values"
      properties:
        profileType:
          type: "string"
          const: "INSTANTANEOUS"
        customerRefs:
          $ref: "#/components/schemas/IdentifierList"
        meterRefs:
          $ref: "#/components/schemas/IdentifierList"
        capturedAt:
          type: "string"
          format: "date-time"
        values:
          type: "array"
          minItems: 1
          items:
            $ref: "#/components/schemas/InstantaneousValue"

    EventProfile:
      type: "object"
      title: "EventProfile"
      description: "IS 15959 event log for one meter over a coverage period."
      required:
        - "profileType"
        - "customerRefs"
        - "meterRefs"
        - "coveragePeriod"
        - "events"
      properties:
        profileType:
          type: "string"
          const: "EVENT"
        customerRefs:
          $ref: "#/components/schemas/IdentifierList"
        meterRefs:
          $ref: "#/components/schemas/IdentifierList"
        coveragePeriod:
          $ref: "#/components/schemas/TimeInterval"
        events:
          type: "array"
          items:
            $ref: "#/components/schemas/MeterEvent"

    Identifier:
      type: "object"
      title: "Identifier"
      description: "Canonical {scheme, value} reference. Used for customer/meter/SDP/OBIS references."
      required:
        - "scheme"
        - "value"
      properties:
        scheme:
          $ref: "#/components/schemas/IdentifierScheme"
        value:
          type: "string"
        namespace:
          type: "string"

    IdentifierList:
      type: "array"
      title: "IdentifierList"
      description: "Non-empty list of Identifiers for the same underlying entity. First element is the primary; additional elements are alternates under different schemes."
      minItems: 1
      items:
        $ref: "#/components/schemas/Identifier"

    TimeInterval:
      type: "object"
      description: "Half-open interval [start, end). ISO-8601 with mandatory offset."
      required:
        - "start"
        - "end"
      properties:
        start:
          type: "string"
          format: "date-time"
        end:
          type: "string"
          format: "date-time"

    IntervalPeriod:
      type: "object"
      description: "Bounding period for an IntervalBlock: start + duration."
      required:
        - "start"
        - "duration"
      properties:
        start:
          type: "string"
          format: "date-time"
        duration:
          type: "string"
          format: "duration"

    IntervalBlock:
      type: "object"
      description: "OpenADR-inspired compact block: descriptors once + positional values per row + sparse quality overrides."
      required:
        - "intervalPeriod"
        - "intervalLength"
        - "payloadDescriptors"
        - "intervals"
      properties:
        intervalPeriod:
          $ref: "#/components/schemas/IntervalPeriod"
        intervalLength:
          type: "string"
          format: "duration"
          description: "Per-row cadence, e.g. PT30M or P1D."
        payloadDescriptors:
          type: "array"
          minItems: 1
          items:
            $ref: "#/components/schemas/PayloadDescriptor"
        intervals:
          type: "array"
          minItems: 1
          items:
            $ref: "#/components/schemas/IntervalRow"
        qualityOverrides:
          type: "array"
          items:
            $ref: "#/components/schemas/QualityOverride"

    PayloadDescriptor:
      type: "object"
      description: "One quantity declared once per block; rows' values[] align positionally with descriptors[]."
      required:
        - "readingTypeRef"
      properties:
        readingTypeRef:
          $ref: "#/components/schemas/Identifier"
        unit:
          $ref: "#/components/schemas/UnitOfMeasure"
        accumulationBehaviour:
          $ref: "#/components/schemas/AccumulationBehaviour"
        phase:
          $ref: "#/components/schemas/Phase"
        powerOfTenMultiplier:
          type: "integer"
        touZone:
          type: "integer"
          minimum: 0
          maximum: 8

    IntervalRow:
      type: object
      description: "One time-series row. values[k] is the value for payloadDescriptors[k]."
      required:
        - "id"
        - "values"
      properties:
        id:
          type: "integer"
          minimum: 0
        values:
          type: "array"
          minItems: 1
          items:
            type: "number"

    QualityOverride:
      type: "object"
      description: "Sparse — list only intervals whose quality differs from the default {VALID, METER}."
      required:
        - "intervalId"
        - "validationStatus"
      properties:
        intervalId:
          type: "integer"
          minimum: 0
        descriptorIndex:
          type: "integer"
          minimum: 0
        validationStatus:
          $ref: "#/components/schemas/ValidationStatus"
        source:
          $ref: "#/components/schemas/ReadingSource"
        changeMethod:
          type: "string"
        failCode:
          type: "string"

    Customer:
      type: "object"
      required:
        - "id"
        - "name"
      properties:
        id:
          $ref: "#/components/schemas/Identifier"
        name:
          type: "string"
        consumerCategory:
          type: "string"
          description: "Utility tariff category (e.g., LT2A, NDS, HT)."
        sanctionedLoadKw:
          type: "number"
          minimum: 0
        billingCycleDay:
          type: "integer"
          minimum: 1
          maximum: 31

    ServiceDeliveryPoint:
      type: "object"
      required:
        - "id"
      properties:
        id:
          $ref: "#/components/schemas/Identifier"
        addressLine:
          type: "string"
        city:
          type: "string"
        postalCode:
          type: "string"
        latitude:
          type: "number"
          minimum: -90
          maximum: 90
        longitude:
          type: "number"
          minimum: -180
          maximum: 180

    Meter:
      type: "object"
      required:
        - "id"
      properties:
        id:
          $ref: "#/components/schemas/Identifier"
        manufacturer:
          type: "string"
        modelNumber:
          type: "string"
        meterCategory:
          $ref: "#/components/schemas/MeterCategory"
        serviceKind:
          $ref: "#/components/schemas/ServiceKind"

    Association:
      type: "object"
      required:
        - "serviceDeliveryPointRefs"
        - "meterRefs"
      properties:
        serviceDeliveryPointRefs:
          $ref: "#/components/schemas/IdentifierList"
        meterRefs:
          $ref: "#/components/schemas/IdentifierList"
        feederId:
          $ref: "#/components/schemas/Identifier"
        dtId:
          $ref: "#/components/schemas/Identifier"
        installedAt:
          type: "string"
          format: "date-time"

    TotalsEntry:
      type: "object"
      description: "One entry inside totals[]. Carries either an energy aggregate or a max-demand snapshot."
      required:
        - "readingTypeRef"
        - "value"
      properties:
        readingTypeRef:
          $ref: "#/components/schemas/Identifier"
        value:
          type: "number"
        openingValue:
          type: "number"
        closingValue:
          type: "number"
        occurredAt:
          type: "string"
          format: "date-time"
        integrationPeriod:
          type: "string"
          format: "duration"

    TouBucket:
      type: "object"
      required:
        - "zone"
        - "readingTypeRef"
        - "value"
      properties:
        zone:
          type: "integer"
          minimum: 1
          maximum: 8
        readingTypeRef:
          $ref: "#/components/schemas/Identifier"
        value:
          type: "number"

    InstantaneousValue:
      type: "object"
      required:
        - "readingTypeRef"
        - "value"
      properties:
        readingTypeRef:
          $ref: "#/components/schemas/Identifier"
        value:
          type: "number"
        unit:
          $ref: "#/components/schemas/UnitOfMeasure"
        phase:
          $ref: "#/components/schemas/Phase"
        accumulationBehaviour:
          $ref: "#/components/schemas/AccumulationBehaviour"
        occurredAt:
          type: "string"
          format: "date-time"

    MeterEvent:
      type: "object"
      required:
        - "timestamp"
        - "eventId"
      properties:
        timestamp:
          type: "string"
          format: "date-time"
        eventId:
          type: "integer"
          minimum: 1
        eventName:
          type: "string"
        phase:
          $ref: "#/components/schemas/Phase"
        sequence:
          type: "integer"
          minimum: 0
        magnitude:
          type: "number"
        duration:
          type: "string"
          format: "duration"

    IdentifierScheme:
      type: "string"
      enum:
        - "METER_SERIAL"
        - "METER_BADGE"
        - "MRID"
        - "OBIS"
        - "SHORT_CODE"
        - "CONSUMER_NUMBER"
        - "SERVICE_DELIVERY_POINT"
        - "DID"
        - "ORG"
        - "OTHER"

    Phase:
      type: "string"
      enum:
        - "NONE"
        - "R"
        - "Y"
        - "B"
        - "ABC"

    UnitOfMeasure:
      type: "string"
      enum:
        - "kWh"
        - "kVAh"
        - "kvarh"
        - "kW"
        - "kvar"
        - "kVA"
        - "V"
        - "A"
        - "Hz"
        - "PF"
        - "NONE"
        - "INR"
        - "USD"

    AccumulationBehaviour:
      type: "string"
      enum:
        - "CUMULATIVE"
        - "DELTA"
        - "INSTANTANEOUS"
        - "SUMMATION"
        - "INDICATING"

    ValidationStatus:
      type: "string"
      enum:
        - "VALID"
        - "ESTIMATED"
        - "MANUAL"
        - "SUSPECT"
        - "REJECTED"

    ReadingSource:
      type: "string"
      enum:
        - "METER"
        - "HES"
        - "ESTIMATED"
        - "MANUAL"
        - "IMPORT"

    MeterCategory:
      type: "string"
      enum:
        - "A"
        - "B"
        - "C"
        - "D1"
        - "D2"
        - "D3"
        - "D4"

    ServiceKind:
      type: "string"
      enum:
        - "ELECTRICITY"
        - "GAS"
        - "WATER"
        - "HEAT"
